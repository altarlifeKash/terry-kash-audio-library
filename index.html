<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Terry Kash Audio Library</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #05070d;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .page {
    width: min(100%, 540px);
    min-height: 100vh;
    position: relative;
    background: #05070d;
    overflow: hidden;
  }

  .poster {
    width: 100%;
    height: 100vh;
    object-fit: contain;
    object-position: center;
    display: block;
  }

  .enter-area {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 24px;
    text-align: center;
    z-index: 2;
  }

  .enter-button {
    display: inline-block;
    text-decoration: none;
    color: #1a1005;
    background: linear-gradient(180deg, #fff1a8 0%, #f4c45b 45%, #b77218 100%);
    border: 2px solid rgba(255, 245, 190, 0.95);
    border-radius: 16px;
    padding: 14px 28px;
    font-weight: 900;
    font-size: clamp(20px, 5vw, 30px);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    box-shadow: 0 0 24px rgba(244,196,91,0.75);
  }

  .enter-button:hover {
    transform: scale(1.03);
  }

  .caption {
    margin-top: 10px;
    font-size: 14px;
    color: #fff8da;
    text-shadow: 0 2px 8px black;
  }

  .language {
    margin-top: 7px;
    font-size: 13px;
    color: #56e6ff;
    text-shadow: 0 2px 8px black;
  }

  @media (max-width: 480px) {
    .enter-area {
      bottom: 18px;
    }

    .enter-button {
      padding: 12px 22px;
    }
  }
</style>
</head>

<body>
  <main class="page">
    <a href="https://terrykash.bandcamp.com" target="_blank" rel="noopener">
      <img
        class="poster"
        src="terry_kash_library_enter_poster.png"
        alt="The Terry Kash Audio Library"
      />
    </a>
  </main>
</body>
