<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Terry Kash Audio Library</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #05070d;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .page {
    width: min(100%, 800px);
  }

.poster {
    width: 100%;
    height: 100vh;
    object-fit: contain;
    object-position: center;
    display: block;
    transition: filter .3s ease;
    cursor: pointer;
    animation: gentleFloat 10s ease-in-out infinite;
}

.poster:hover {
    filter: brightness(1.05);
}

@keyframes gentleFloat {
    0%, 100% {
        transform: translateY(0px) scale(1);
    }

    50% {
        transform: translateY(-4px) scale(1.01);
    }
}
  }
</style>
</head>

<body>
  <main class="page">
    <a href="https://terrykash.bandcamp.com" target="_blank" rel="noopener">
      <img
        class="poster"
        src="terry_kash_library_enter_poster.png"
        alt="The Terry Kash Audio Library"
      />
    </a>
  </main>
</body>
</html>
